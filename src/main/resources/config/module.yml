# Конфигурация модуля
module:
  # База данных - развертывание схем и данных
  database:
    - name: "procurement-create-schema"
      path: "config/procurement/database/procurement_000_create_schema.xml"
      description: "Phase 2.5.5: создаёт схему `procurement` до того как любой createTable начнёт её заселять"
      enabled: true
      order: 0
    - name: "procurement-schema"
      path: "config/procurement/database/procurement_001_schema.xml"
      description: "Схема таблиц для сервиса 'Ассистент закупок'"
      enabled: true
      order: 1

# Настройки модуля
procurement:
  processing:
    # Интервал проверки статуса обработки в миллисекундах (по умолчанию 10 секунд)
    polling-interval: 10000
