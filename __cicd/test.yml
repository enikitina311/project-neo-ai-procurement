# Code quality analysis
code-quality:
  stage: test
  image: maven:3.9.4-eclipse-temurin-17
  script:
    - echo "Running code quality checks..."
    - mvn checkstyle:check -B || true
    - mvn pmd:check -B || true
  artifacts:
    when: always
    paths:
      - target/checkstyle-result.xml
      - target/pmd.xml
    expire_in: 1 week
  cache:
    key: "${CI_COMMIT_REF_SLUG}"
    paths:
      - .m2/repository
    policy: pull
  tags:
    - ai-studio-agent
  allow_failure: true
